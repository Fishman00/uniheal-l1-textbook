<!DOCTYPE html>
<html lang="zh-CN">
<head>
<script>
/* ─── UNIHEAL Access Protection ──────────── */
(function() {
    var CFG = {
        _hash: 'b197996d8840a339c96f363826bd8f0b149386ef9682136ee1d1bb551ea28c90',
        e: 1778743208646,
        k: 'uniheal_auth'
    };

    function sha256(s) {
        var buf = new TextEncoder().encode(s);
        return crypto.subtle.digest('SHA-256', buf).then(function(h) {
            return Array.from(new Uint8Array(h)).map(function(b) {
                return b.toString(16).padStart(2, '0');
            }).join('');
        });
    }

    function init() {
        var now = Date.now();
        if (now > CFG.e) { showExpired(); return; }
        var saved = localStorage.getItem(CFG.k);
        if (saved) {
            try {
                var d = JSON.parse(saved);
                if (d.e > now) { unlock(); return; }
            } catch(x) {}
        }
        showLogin();
    }

    function unlock() {
        document.documentElement.style.display = '';
        var ol = document.getElementById('auth_overlay');
        if (ol) ol.remove();
        document.body.style.overflow = '';
        localStorage.setItem(CFG.k, JSON.stringify({ok:1, e: CFG.e}));
        var iv = setInterval(function() {
            if (Date.now() > CFG.e) {
                clearInterval(iv);
                showExpired();
                localStorage.removeItem(CFG.k);
            }
        }, 60000);
    }

    function showExpired() {
        document.body.innerHTML =
            '<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;' +
            'background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);color:#fff;' +
            'font-family:-apple-system,sans-serif;padding:20px">' +
            '<div style="text-align:center;max-width:400px">' +
            '<div style="font-size:48px;margin-bottom:16px">&#9200;</div>' +
            '<h2 style="font-size:20px;margin-bottom:12px">访问已过期</h2>' +
            '<p style="color:#8899aa;font-size:14px;line-height:1.8">本教材访问已过期，请联系管理员获取最新访问权限。</p>' +
            '</div></div>';
    }

    function showLogin() {
        document.documentElement.style.display = '';
        var overlay = document.createElement('div');
        overlay.id = 'auth_overlay';
        overlay.innerHTML =
            '<div style="position:fixed;inset:0;background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);' +
            'display:flex;align-items:center;justify-content:center;z-index:99999;padding:20px">' +
            '<div style="background:rgba(255,255,255,0.05);backdrop-filter:blur(20px);' +
            'border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:40px;' +
            'max-width:420px;width:100%;text-align:center">' +
            '<div style="font-size:40px;margin-bottom:12px">&#128218;</div>' +
            '<h2 style="color:#fff;font-size:20px;margin-bottom:4px">UNIHEAL L1 教材</h2>' +
            '<p style="color:#8899aa;font-size:13px;margin-bottom:24px">请输入访问密码以继续阅读</p>' +
            '<input id="auth_pwd" type="password" placeholder="输入密码" ' +
            'style="width:100%;padding:14px 16px;border:1px solid rgba(255,255,255,0.15);' +
            'border-radius:10px;background:rgba(0,0,0,0.3);color:#fff;font-size:15px;' +
            'outline:none;margin-bottom:12px">' +
            '<p id="auth_err" style="color:#ef5350;font-size:12px;min-height:18px;margin-bottom:8px"></p>' +
            '<button onclick="doAuth()" style="width:100%;padding:14px;border:none;border-radius:10px;' +
            'background:linear-gradient(135deg,#4fc3f7,#29b6f6);color:#fff;font-size:15px;' +
            'font-weight:600;cursor:pointer">进入教材</button>' +
            '</div></div>';
        document.body.appendChild(overlay);
        document.body.style.overflow = 'hidden';
        setTimeout(function() {
            var inp = document.getElementById('auth_pwd');
            if (inp) inp.focus();
        }, 100);
        inp = document.getElementById('auth_pwd');
        if (inp) {
            inp.addEventListener('keydown', function(ev) {
                if (ev.key === 'Enter') doAuth();
            });
        }
    }

    window.doAuth = function() {
        var pwd = document.getElementById('auth_pwd').value;
        var err = document.getElementById('auth_err');
        if (!pwd) { err.textContent = '请输入密码'; return; }
        sha256(pwd).then(function(hash) {
            if (hash === CFG._hash) {
                unlock();
            } else {
                err.textContent = '密码错误，请重试';
                document.getElementById('auth_pwd').value = '';
                document.getElementById('auth_pwd').focus();
            }
        });
    };

    document.documentElement.style.display = 'none';
    init();
})();
</script>


</body>
</html>
